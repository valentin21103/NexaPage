<section class="dl-page">
  <div class="dl-bg"></div>
  <div class="dl-inner">

    <a routerLink="/sistema" class="dl-back">← Volver a GestorPro</a>

    <div class="dl-hero">

        El sistema de gestión para tu comercio. Instalalo en tu PC y empezá a

      </p>

      <div class="dl-actions">
        <!-- Instalador alojado en GitHub Releases. Al sacar una versión nueva, actualizá la URL (vXXX y el nombre del .exe). -->
        <a href="https://github.com/valentin21103/GestorProApp/releases/download/v1.1.0/GestorPro-Setup-1.1.0.exe"
           class="dl-btn dl-btn-download" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar para Windows (102 MB)
        </a>
        <a routerLink="/contacto" class="dl-btn dl-btn-ghost">Hablar con nosotros</a>
      </div>
      <span class="dl-note">Descarga disponible tras crear tu cuenta · Windows 10 u 11</span>
    </div>
